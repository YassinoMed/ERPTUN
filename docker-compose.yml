        condition: service_healthy
      redis:
        condition: service_healthy

  quality-service:
    <<: *laravel-service
    container_name: erp-quality
    command: php artisan serve --host=0.0.0.0 --port=8013
    environment:
      <<: *laravel-env-base
      APP_NAME: "ERPGo Quality"
      APP_SERVICE: "quality"
      MODULE_STATUSES_FILE: /var/www/html/bootstrap/cache/service-modules/quality.json
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  maintenance-service:
    <<: *laravel-service
    container_name: erp-maintenance
    command: php artisan serve --host=0.0.0.0 --port=8014
    environment:
      <<: *laravel-env-base
      APP_NAME: "ERPGo Maintenance"
      APP_SERVICE: "maintenance"
      MODULE_STATUSES_FILE: /var/www/html/bootstrap/cache/service-modules/maintenance.json
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  chatgpt-service:
    <<: *laravel-service
    container_name: erp-chatgpt
    command: php artisan serve --host=0.0.0.0 --port=8015
    environment:
      <<: *laravel-env-base
      APP_NAME: "ERPGo ChatGPT"
      APP_SERVICE: "chatgpt"
      MODULE_STATUSES_FILE: /var/www/html/bootstrap/cache/service-modules/chatgpt.json
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  hotel-service:
    <<: *laravel-service
    container_name: erp-hotel
    command: php artisan serve --host=0.0.0.0 --port=8016
    environment:
      <<: *laravel-env-base
      APP_NAME: "ERPGo Hotel"
      APP_SERVICE: "hotel"
      MODULE_STATUSES_FILE: /var/www/html/bootstrap/cache/service-modules/hotel.json
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  traceability-service:
    <<: *laravel-service
    container_name: erp-traceability
    command: php artisan serve --host=0.0.0.0 --port=8017
    environment:
      <<: *laravel-env-base
      APP_NAME: "ERPGo Traceability"
      APP_SERVICE: "traceability"
