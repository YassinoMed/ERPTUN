        condition: service_healthy
      redis:
        condition: service_healthy

  cropplanning-service:
    <<: *laravel-service
    container_name: erp-cropplanning
    command: php artisan serve --host=0.0.0.0 --port=8018
    environment:
      <<: *laravel-env-base
      APP_NAME: "ERPGo Crop Planning"
      APP_SERVICE: "cropplanning"
