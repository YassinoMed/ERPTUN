    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  cooperative-service:
    <<: *laravel-service
    container_name: erp-cooperative
    command: php artisan serve --host=0.0.0.0 --port=8019
    environment:
      <<: *laravel-env-base
      APP_NAME: "ERPGo Cooperative"
