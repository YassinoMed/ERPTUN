# =====================================================================
# ERPGo SaaS — Docker Compose
# =====================================================================
# Architecture : BD MySQL unique centralisée (erpgo)
# Tous les services Laravel pointent vers la même DB
# =====================================================================
# Usage:
#   docker compose up -d              → Lancer tout
#   docker compose up -d core         → Lancer seulement core + deps
#   docker compose logs -f core       → Voir les logs
#   docker compose down               → Arrêter tout
#   docker compose down -v            → Arrêter + supprimer volumes
# =====================================================================

networks:
  erp_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  mysql_data: {}
  redis_data: {}
  kafka_data: {}
  zookeeper_data: {}

# =====================================================================
# YAML ANCHORS (DRY — Don't Repeat Yourself)
# =====================================================================

x-laravel-service: &laravel-service
  build:
    context: .
    dockerfile: Dockerfile
  image: local-erp-php:8.4
  restart: unless-stopped
  working_dir: /var/www/html
  volumes:
    - ./:/var/www/html
  networks:
    - erp_network
  environment: &laravel-env-base
    APP_ENV: local
    APP_DEBUG: "true"
    APP_KEY: "${APP_KEY:-}"
    APP_URL: http://localhost:8080
    APP_SERVICE: core
    MODULE_STATUSES_FILE: /var/www/html/bootstrap/cache/service-modules/core.json
    # ── Database (BD unique centralisée) ──
    DB_CONNECTION: mysql
    DB_HOST: mysql
    DB_PORT: "3306"
    DB_DATABASE: erpgo
    DB_USERNAME: erpgo_user
    DB_PASSWORD: erpgo_secret_2026
    CORE_DB_DATABASE: erpgo
    APPROVALS_DB_DATABASE: erpgo_approvals
    MRP_DB_DATABASE: erpgo_mrp
    QUALITY_DB_DATABASE: erpgo_quality
    PRODUCTION_DB_DATABASE: erpgo_production
    MAINTENANCE_DB_DATABASE: erpgo_maintenance
    CHATGPT_DB_DATABASE: erpgo_chatgpt
    HOTEL_DB_DATABASE: erpgo_hotel
    TRACEABILITY_DB_DATABASE: erpgo_traceability
    CROP_PLANNING_DB_DATABASE: erpgo_cropplanning
    COOPERATIVE_DB_DATABASE: erpgo_cooperative
    HEDGING_DB_DATABASE: erpgo_hedging
    BTP_DB_DATABASE: erpgo_btp
    INTEGRATIONS_DB_DATABASE: erpgo_integrations
    HROPS_DB_DATABASE: erpgo_hrops
    OPERATIONS_DB_DATABASE: erpgo_operations
    PLATFORM_DB_DATABASE: erpgo_platform
    INDUSTRY_DB_DATABASE: erpgo_industry
    BILLING_DB_DATABASE: erpgo_billing
    SAAS_DB_DATABASE: erpgo_saas
    # ── Redis ──
    REDIS_HOST: redis
    REDIS_PORT: "6379"
    REDIS_PASSWORD: ""
    # ── Kafka ──
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    # ── Cache & Session ──
    CACHE_DRIVER: redis
    SESSION_DRIVER: redis
    QUEUE_CONNECTION: redis
  healthcheck:
    test: ["CMD-SHELL", "php -r 'echo 1;' || exit 1"]
    interval: 20s
    timeout: 10s
    retries: 5
    start_period: 45s
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  deploy:
    resources:
      limits:
        memory: 512M
      reservations:
        memory: 128M

# =====================================================================
#                         S E R V I C E S
# =====================================================================
services:

  # ==================================================================
  # 1. DATABASE — BD MySQL unique centralisée
  # ==================================================================
  mysql:
    image: mysql:8.0
    container_name: erp-mysql
    restart: unless-stopped
    networks:
      - erp_network
    ports:
      - "33070:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_secret_2026
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: erpgo
      MYSQL_USER: erpgo_user
      MYSQL_PASSWORD: erpgo_secret_2026
    command:
      - --innodb-buffer-pool-size=512M
      - --max-connections=300
      - --innodb-flush-log-at-trx-commit=2
      - --innodb-log-file-size=128M
      - --innodb-file-per-table=1
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_secret_2026"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ==================================================================
  # 2. API GATEWAY — SINGLE ENTRY POINT
  # ==================================================================
  gateway:
    image: nginx:1.25-alpine
    container_name: erp-gateway
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - erp_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    depends_on:
      core:
        condition: service_started

  # ==================================================================
  # 3. INFRASTRUCTURE — Cache & Event Streaming
  # ==================================================================
  redis:
    image: redis:7-alpine
    container_name: erp-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - erp_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 64M

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: erp-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - erp_network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: erp-kafka
    restart: unless-stopped
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 60000
      KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: 60000
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - erp_network
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ==================================================================
  # 4. CORE SERVICE — Noyau central ERP
  # ==================================================================
  core:
    <<: *laravel-service
    container_name: erp-core
    command: php artisan serve --host=0.0.0.0 --port=8000
    ports:
      - "8000:8000"
    environment:
      <<: *laravel-env-base
      APP_NAME: "ERPGo Core"
      APP_SERVICE: "core"
      MODULE_STATUSES_FILE: /var/www/html/bootstrap/cache/service-modules/core.json
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  # ==================================================================
  # 5. HEDGING SERVICE — Couverture Agricole
  # ==================================================================
  hedging-service:
    <<: *laravel-service
    container_name: erp-hedging
    command: php artisan serve --host=0.0.0.0 --port=8020
    ports:
      - "8030:8020"
    environment:
      <<: *laravel-env-base
      APP_NAME: "ERPGo Hedging"
      APP_SERVICE: "hedging"
      MODULE_STATUSES_FILE: /var/www/html/bootstrap/cache/service-modules/hedging.json
    depends_on:
      core:
        condition: service_started

  # ==================================================================
  # 6. DOMAIN SERVICES — Découpage runtime par domaine
  # Tous ces services partagent encore la base centralisée `erpgo`
  # ==================================================================
  billing:
    <<: *laravel-service
    container_name: erp-billing
    command: php artisan serve --host=0.0.0.0 --port=8001
    environment:
      <<: *laravel-env-base
      APP_NAME: "ERPGo Billing"
      APP_SERVICE: "billing"
      MODULE_STATUSES_FILE: /var/www/html/bootstrap/cache/service-modules/billing.json
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  approvals-service:
    <<: *laravel-service
    container_name: erp-approvals
    command: php artisan serve --host=0.0.0.0 --port=8011
    environment:
      <<: *laravel-env-base
      APP_NAME: "ERPGo Approvals"
      APP_SERVICE: "approvals"
      MODULE_STATUSES_FILE: /var/www/html/bootstrap/cache/service-modules/approvals.json
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mrp-service:
    <<: *laravel-service
    container_name: erp-mrp
    command: php artisan serve --host=0.0.0.0 --port=8012
    environment:
      <<: *laravel-env-base
      APP_NAME: "ERPGo MRP"
      APP_SERVICE: "mrp"
      MODULE_STATUSES_FILE: /var/www/html/bootstrap/cache/service-modules/mrp.json
