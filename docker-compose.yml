  hrops-service:
    <<: *laravel-service
    container_name: erp-hrops
    command: php artisan serve --host=0.0.0.0 --port=8021
    environment:
      <<: *laravel-env-base
      APP_NAME: "ERPGo HR Ops"
      APP_SERVICE: "hrops"
      MODULE_STATUSES_FILE: /var/www/html/bootstrap/cache/service-modules/hrops.json
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  operations-service:
    <<: *laravel-service
    container_name: erp-operations
    command: php artisan serve --host=0.0.0.0 --port=8022
    environment:
      <<: *laravel-env-base
      APP_NAME: "ERPGo Operations"
      APP_SERVICE: "operations"
      MODULE_STATUSES_FILE: /var/www/html/bootstrap/cache/service-modules/operations.json
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  platform-service:
    <<: *laravel-service
    container_name: erp-platform
    command: php artisan serve --host=0.0.0.0 --port=8023
    environment:
      <<: *laravel-env-base
      APP_NAME: "ERPGo Platform"
      APP_SERVICE: "platform"
      MODULE_STATUSES_FILE: /var/www/html/bootstrap/cache/service-modules/platform.json
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  industry-service:
    <<: *laravel-service
    container_name: erp-industry
    command: php artisan serve --host=0.0.0.0 --port=8024
    environment:
      <<: *laravel-env-base
      APP_NAME: "ERPGo Industry"
      APP_SERVICE: "industry"
      MODULE_STATUSES_FILE: /var/www/html/bootstrap/cache/service-modules/industry.json
