  # ==================================================================
  # 7. QUEUE WORKER — Traitement des jobs en background
  # ==================================================================
  queue-worker:
    <<: *laravel-service
    container_name: erp-queue-worker
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    environment:
      <<: *laravel-env-base
      APP_NAME: "ERPGo Queue Worker"
      APP_SERVICE: "core"
      MODULE_STATUSES_FILE: /var/www/html/bootstrap/cache/service-modules/core.json
    healthcheck:
      test: ["CMD-SHELL", "php -r 'echo 1;' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==================================================================
  # 8. CRON SCHEDULER — Tâches planifiées Laravel
  # ==================================================================
  scheduler:
    <<: *laravel-service
    container_name: erp-scheduler
    entrypoint: ["sh", "-c"]
    command: ["while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    environment:
      <<: *laravel-env-base
      APP_NAME: "ERPGo Scheduler"
      APP_SERVICE: "core"
      MODULE_STATUSES_FILE: /var/www/html/bootstrap/cache/service-modules/core.json
    healthcheck:
      test: ["CMD-SHELL", "php -r 'echo 1;' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
