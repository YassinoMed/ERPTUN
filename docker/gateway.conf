    }

    location /saas/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://saas_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Service-Name "saas";
    }

    # ==============================================================
    # API — Tout /api/* route vers core
    # ==============================================================
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://core_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Service-Name "core-api";
    }

    # ==============================================================
    # STATIC ASSETS — Cache agressif
    # ==============================================================
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://core_upstream;
        proxy_set_header Host $host;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ==============================================================
    # DEFAULT — Frontend / Web UI
    # ==============================================================
    location / {
        proxy_pass http://core_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ==============================================================
    # ERROR PAGES
    # ==============================================================
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        return 503 '{"error":"Service temporarily unavailable","code":503}';
        add_header Content-Type application/json;
    }
}
