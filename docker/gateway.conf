# =====================================================================
# ERPGo SaaS — Nginx API Gateway Configuration
# =====================================================================
# Single entry point for all microservices
# Supports: Reverse Proxy, Load Balancing, Rate Limiting, Security Headers
# =====================================================================

# -------------------------------------------------------
# UPSTREAM DEFINITIONS (for load balancing & failover)
# To scale a service: docker compose up -d --scale core=3
# Nginx will round-robin across all replicas automatically
# -------------------------------------------------------

upstream core_upstream {
    least_conn;                    # Use least-connections algorithm
    server core:8000;
    # Add more replicas here or use docker compose --scale
}
upstream hedging_upstream {
    server hedging-service:8020;
}
# -------------------------------------------------------
# RATE LIMITING (protection against abuse)
# -------------------------------------------------------
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# -------------------------------------------------------
# SERVER BLOCK
# -------------------------------------------------------
server {
    listen 80;
    server_name _;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Hide Nginx version ---
    server_tokens off;

    # --- Request size limit (file uploads) ---
    client_max_body_size 50M;

    # --- Timeouts ---
    proxy_connect_timeout 30s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # --- Common proxy headers (reusable) ---
    # These are set per location block below

    # ==============================================================
    # HEALTH CHECK ENDPOINT (for Gateway itself)
    # ==============================================================
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }

    # ==============================================================
    # MICROSERVICE ROUTES
    # Each path prefix routes to a dedicated upstream
    # ==============================================================


    # --- CRM (handled by core) ---
    location /crm/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://core_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Service-Name "crm";
    }

    # --- HRM (handled by core) ---
    location /hrm/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://core_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Service-Name "hrm";
    }

    # --- Projects (handled by core) ---
    location /projects/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://core_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Service-Name "projects";
    }

    # --- POS (handled by core) ---
    location /pos/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://core_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Service-Name "pos";
    }

    # --- Inventory (handled by core) ---
    location /inventory/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://core_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Service-Name "inventory";
    }

    # --- Accounting (handled by core) ---
    location /accounting/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://core_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Service-Name "accounting";
    }

    # --- Sales (handled by core) ---
    location /sales/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://core_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Service-Name "sales";
    }

    # --- WMS (handled by core) ---
    location /wms/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://core_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Service-Name "wms";
    }

    # --- Production (handled by core) ---
    location /production/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://core_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Service-Name "production";
    }


    # --- Hedging Service ---
    location /hedging/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://hedging_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Service-Name "hedging";
    }


    # ==============================================================
    # LOGIN ENDPOINT — stricter rate limiting
    # ==============================================================
    location /api/login {
        limit_req zone=login_limit burst=3 nodelay;
        proxy_pass http://core_upstream/api/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==============================================================
    # GENERAL API — Catch-all for /api/* routes (core)
    # ==============================================================
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://core_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Service-Name "core-api";
    }

    # ==============================================================
    # DEFAULT — Frontend / Web UI (core)
    # ==============================================================
    location / {
        proxy_pass http://core_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ==============================================================
    # ERROR PAGES
    # ==============================================================
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        return 503 '{"error":"Service temporarily unavailable","code":503}';
        add_header Content-Type application/json;
    }
}
