# =====================================================================
# ERPGo SaaS — Nginx API Gateway Configuration
# =====================================================================
# Architecture: BD unique — tous les services via core_upstream
# =====================================================================

# -------------------------------------------------------
# UPSTREAM DEFINITIONS
# -------------------------------------------------------
upstream core_upstream {
    least_conn;
    server core:8000;
    # Pour scaler : docker compose up -d --scale core=3
}

upstream hedging_upstream {
    server hedging-service:8020;
}

upstream billing_upstream {
    server billing:8001;
}

upstream approvals_upstream {
    server approvals-service:8011;
}

upstream mrp_upstream {
    server mrp-service:8012;
}

upstream quality_upstream {
    server quality-service:8013;
}

upstream maintenance_upstream {
    server maintenance-service:8014;
}

upstream chatgpt_upstream {
    server chatgpt-service:8015;
}

upstream hotel_upstream {
    server hotel-service:8016;
}

upstream traceability_upstream {
    server traceability-service:8017;
}

upstream cropplanning_upstream {
    server cropplanning-service:8018;
}

upstream cooperative_upstream {
    server cooperative-service:8019;
}

upstream hrops_upstream {
    server hrops-service:8021;
}

upstream operations_upstream {
    server operations-service:8022;
}

upstream platform_upstream {
    server platform-service:8023;
}

upstream industry_upstream {
    server industry-service:8024;
}

upstream btp_upstream {
    server btp-service:8025;
}

upstream integrations_upstream {
    server integrations-service:8026;
}

upstream saas_upstream {
    server saas-service:8027;
}

# -------------------------------------------------------
# RATE LIMITING
# -------------------------------------------------------
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# -------------------------------------------------------
# SERVER BLOCK
# -------------------------------------------------------
server {
    listen 80;
    server_name _;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server_tokens off;
    client_max_body_size 50M;

    # --- Timeouts ---
    proxy_connect_timeout 30s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ==============================================================
    # HEALTH CHECK
    # ==============================================================
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }

    # ==============================================================
    # LOGIN — Rate limiting strict
    # ==============================================================
    location /api/login {
        limit_req zone=login_limit burst=3 nodelay;
        proxy_pass http://core_upstream/api/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==============================================================
    # DOMAIN API ROUTES — routage dédié par domaine
    # ==============================================================
    location /api/invoices {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://billing_upstream/api/invoices;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Service-Name "billing";
    }

    location /api/approvals/ {
        limit_req zone=api_limit burst=20 nodelay;
